# ZMK Studio runtime editing (already supported by this fork)
CONFIG_ZMK_STUDIO=y

# Combos (two keys at once to emit something else)
CONFIG_ZMK_COMBO=y

# Optional: raise some hold-tap limits if you go heavy on them
CONFIG_ZMK_BEHAVIOR_HOLD_TAP_MAX_HELD=16
CONFIG_ZMK_BEHAVIOR_HOLD_TAP_MAX_CAPTURED_EVENTS=64
