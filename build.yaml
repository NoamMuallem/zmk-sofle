---
include:
  # LEFT half — Studio enabled and unlocked
  - board: eyelash_sofle_left
    shield: nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: >-
      -DCONFIG_ZMK_STUDIO=y
      -DCONFIG_ZMK_STUDIO_LOCKING=n
      -DCONFIG_ZMK_USB=y
      -DCONFIG_USB_DEVICE_STACK=y
    artifact-name: eyelash_sofle_left_studio

  # RIGHT half — also Studio enabled, so you can plug in either side
  - board: eyelash_sofle_right
    shield: nice_view
    snippet: studio-rpc-usb-uart
    cmake-args: >-
      -DCONFIG_ZMK_STUDIO=y
      -DCONFIG_ZMK_STUDIO_LOCKING=n
      -DCONFIG_ZMK_USB=y
      -DCONFIG_USB_DEVICE_STACK=y
    artifact-name: eyelash_sofle_right_studio

  # Optional: Settings reset image (for wiping config if needed)
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
